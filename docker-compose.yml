version: "3.8"

services:
  dash:
    image: 908027402569.dkr.ecr.eu-north-1.amazonaws.com/my_dah_app:latest
    container_name: dash_app
    expose:
      - "8050"

  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - dash